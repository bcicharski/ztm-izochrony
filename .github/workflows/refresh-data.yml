# Cotygodniowe odświeżenie prekompilowanych danych rozkładowych z GTFS ZTM Gdańsk.
# Po wypchnięciu zmian GitHub Pages (tryb "deploy from branch") publikuje je automatycznie.
name: Odśwież dane rozkładowe

on:
  schedule:
    - cron: '30 3 * * 1'   # poniedziałki, 3:30 UTC
  workflow_dispatch:        # możliwość ręcznego uruchomienia z zakładki Actions

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Pobierz feedy i zbuduj dane wszystkich miast
        run: |
          ok=0; fail=0; failed=""
          for city in $(node -e "console.log(Object.keys(require('./data/cities.json')).join(' '))"); do
            echo "===== $city ====="
            # pojedyncze niedziałające źródło nie może przerwać całego odświeżania —
            # takie miasto pomijamy i zostają jego dotychczasowe dane
            if node tools/fetch-feeds.mjs "$city" "gtfs-src/$city" \
               && node --max-old-space-size=6144 tools/build-data.mjs "$city" gtfs-src/$city/*/; then
              ok=$((ok+1))
            else
              fail=$((fail+1)); failed="$failed $city"; echo "::warning::pominięto $city (błąd feedu/budowy)"
            fi
          done
          echo "Zbudowano: $ok, pominięto: $fail ($failed)"
          # awaria zbiorcza (nic się nie zbudowało) = realny problem, oflaguj
          if [ "$ok" -eq 0 ]; then echo "::error::żadne miasto nie zbudowane"; exit 1; fi

      - name: Skompiluj profile opóźnień z gałęzi delays
        run: |
          git fetch origin delays --depth 1 || true
          if git rev-parse --verify origin/delays >/dev/null 2>&1; then
            git checkout origin/delays -- data/delays || true
          fi
          node tools/build-delays.mjs

      - name: Zapisz zmiany
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Brak zmian w danych."
          else
            git commit -m "Automatyczne odświeżenie danych rozkładowych"
            git push
          fi
